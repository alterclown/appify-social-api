version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appify-social-db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appify-social-db"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: .
    network_mode: "host"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      postgres-db:
        condition: service_started